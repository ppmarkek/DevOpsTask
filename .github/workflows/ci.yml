name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint chart
        working-directory: helm/wordpress
        run: |
          helm lint . -f values-local.yaml
          helm lint . -f values-dev.yaml
          helm lint . -f values-prod.yaml

      - name: Render templates
        working-directory: helm/wordpress
        run: |
          helm template wp-local . -f values-local.yaml > /dev/null
          helm template wp-dev . -f values-dev.yaml > /dev/null
          helm template wp-prod . -f values-prod.yaml > /dev/null
          helm template wp-dev . -f values-dev.yaml \
            --set standaloneMariadb.existingSecret=wp-dev-db-credentials > /dev/null
          helm template wp-prod . -f values-prod.yaml \
            --set standaloneMariadb.existingSecret=wp-prod-db-credentials \
            --set autoscaling.enabled=true > /dev/null

  docker:
    runs-on: ubuntu-latest
    needs: helm-validate
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}/wordpress' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
