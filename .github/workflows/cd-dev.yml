name: CD Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (e.g. develop or sha-abc1234)
        required: false
        default: develop

permissions:
  contents: read
  packages: write

env:
  RELEASE_NAME: wp-dev
  KUBE_CONTEXT: kind-wp-dev

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}/wordpress' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=develop" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.tag }}
            ${{ steps.image.outputs.name }}:dev-${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: self-hosted
    if: always() && needs.build-push.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to dev
        shell: pwsh
        run: |
          ./scripts/deploy-dev.ps1 `
            -Repo "${{ needs.build-push.outputs.image_name }}" `
            -Tag "${{ needs.build-push.outputs.image_tag }}"
