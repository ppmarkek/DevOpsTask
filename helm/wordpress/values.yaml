replicaCount: 2

image:
  repository: wordpress
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

standaloneMariadb:
  enabled: true
  image: mariadb:11
  existingSecret: ""
  rootPassword: changeme
  password: changeme
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

wordpress:
  db:
    host: ""
    name: wordpress
    user: wordpress
    password: ""
  existingSecret: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: wordpress.local

persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
  storageClass: ""

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    path: /
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 30
  readiness:
    path: /
    port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    path: /wp-includes/images/blank.gif
    port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3

env:
  WP_ENV: production
  WP_DEBUG: "false"

podDisruptionBudget:
  enabled: false
  minAvailable: 1
