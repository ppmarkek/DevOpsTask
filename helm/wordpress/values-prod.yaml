# Prod environment values (kind cluster wp-prod, production simulation)

replicaCount: 3

image:
  repository: ghcr.io/ppmarkek/devopstask/wordpress
  tag: main
  pullPolicy: Always
  pullSecrets:
    - ghcr-credentials

standaloneMariadb:
  enabled: true
  image: mariadb:11
  existingSecret: wp-prod-db-credentials

ingress:
  enabled: true
  className: nginx
  host: prod.wordpress.local

persistence:
  enabled: true
  storageClass: local-rwx
  accessMode: ReadWriteMany

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10

podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  WP_ENV: production
  WP_DEBUG: "false"
