# Dev environment — kind cluster wp-dev (free cloud simulation)

replicaCount: 2

image:
  repository: wordpress-devops
  tag: dev
  pullPolicy: Never

mariadb:
  enabled: false

standaloneMariadb:
  enabled: true
  image: mariadb:11
  rootPassword: dev-root
  password: dev-wp

ingress:
  enabled: true
  className: nginx
  host: dev.wordpress.local

persistence:
  enabled: true
  storageClass: local-rwx
  accessMode: ReadWriteMany

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  WP_ENV: development
  WP_DEBUG: "true"
