# Dev environment values (kind cluster wp-dev, cloud simulation)

replicaCount: 2

image:
  repository: ghcr.io/ppmarkek/devopstask/wordpress
  tag: develop
  pullPolicy: Always
  pullSecrets:
    - ghcr-credentials

standaloneMariadb:
  enabled: true
  image: mariadb:11
  existingSecret: wp-dev-db-credentials

ingress:
  enabled: true
  className: nginx
  host: dev.wordpress.local

persistence:
  enabled: true
  storageClass: local-rwx
  accessMode: ReadWriteMany

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  WP_ENV: development
  WP_DEBUG: "true"
