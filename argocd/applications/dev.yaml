apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: wordpress=ghcr.io/ppmarkek/devopstask/wordpress
    argocd-image-updater.argoproj.io/wordpress.update-strategy: newest-build
    argocd-image-updater.argoproj.io/wordpress.allow-tags: regexp:^(develop|dev-[a-f0-9]+)$
    argocd-image-updater.argoproj.io/wordpress.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/wordpress.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: develop
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:values-dev.yaml
spec:
  project: default
  source:
    repoURL: https://github.com/ppmarkek/DevOpsTask.git
    targetRevision: develop
    path: helm/wordpress
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
