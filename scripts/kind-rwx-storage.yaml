# ReadWriteMany storage for kind (single-node).
# Works reliably on Docker Desktop; prod would use EFS / NFS / DO Spaces.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-rwx
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: wp-uploads-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-rwx
  hostPath:
    path: /var/local/wordpress-uploads
    type: DirectoryOrCreate
